name: 🚀 Deploy to Hostinger FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔧 Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build frontend
        run: npm run build
        env:
          VITE_API_URL: /api # Points to the local /api/ directory relative to the frontend domain

      - name: 📂 Integrate PHP API backend into build folder
        run: |
          echo "Injecting PHP API backend into client build..."
          cp -r backend/api dist/api
          echo "Verifying files in dist/api:"
          ls -la dist/api

      - name: 📂 Sync files to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/
